<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inline Spoof</title>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #383838;
      --primary-container: #eaddff;
      --surface: #fef7ff;
      --outline: #79747e;
      --outline-variant: #e7e0ec;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Roboto, sans-serif; background: var(--surface); color: #1d1b20; }
    .app { max-width: 420px; min-height: 100vh; margin: auto; position: relative; padding-bottom: 86px; }

    .topbar { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-size: 22px; background: var(--surface); position: sticky; top: 0; z-index: 10; gap: 10px; }
    .search-box { flex: 1; background: var(--outline-variant); border-radius: 20px; display: flex; align-items: center; padding: 0 12px; height: 40px; }
    .search-box input { background: none; border: none; outline: none; width: 100%; margin-left: 8px; font-size: 14px; }
    .search-box input::placeholder { color: var(--outline); }

    .content { padding: 12px 16px; }
    .page { display: none; }
    .page.active { display: block; }

    .label { font-size: 12px; color: var(--primary); margin: 18px 0 12px; font-weight: 500; display: flex; justify-content: space-between; text-transform: uppercase; letter-spacing: 0.8px; }
    .label:first-child { margin-top: 0; }

    .card { min-height: 72px; background: #ffffff; border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; border: 1px solid var(--outline-variant); cursor: pointer; transition: background 0.2s; user-select: none; -webkit-tap-highlight-color: transparent; }
    .card.selected { background: var(--primary-container); border-color: var(--primary); }

    .icon { width: 40px; height: 40px; border-radius: 10px; background: var(--outline-variant); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .icon img { width: 100%; height: 100%; object-fit: cover; }

    .info { flex: 1; overflow: hidden; }
    .name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pkg { font-size: 12px; color: var(--outline); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .check { display: none; color: var(--primary); }
    .card.selected .check { display: block; }

    .setting-card { background: #ffffff; border: 1px solid var(--outline-variant); border-radius: 12px; padding: 16px; margin-bottom: 8px; }
    .setting-row { display: flex; align-items: center; justify-content: space-between; }
    .input-field { width: 100%; margin-top: 12px; padding: 12px; border-radius: 8px; border: 1px solid var(--outline-variant); background: var(--surface); outline: none; transition: border-color 0.2s; }
    .input-field:focus { border-color: var(--primary); }

    .switch { width: 52px; height: 32px; position: relative; }
    .switch input { display: none; }
    .slider { position: absolute; inset: 0; border-radius: 20px; background: var(--outline); transition: 0.3s; }
    .slider:before { content: ""; position: absolute; width: 24px; height: 24px; left: 4px; top: 4px; background: white; border-radius: 50%; transition: 0.2s; }
    .switch input:checked + .slider { background: var(--primary); }
    .switch input:checked + .slider:before { transform: translateX(20px); }

    .navbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); max-width: 420px; width: 100%; height: 80px; background: #fffbfe; border-top: 1px solid var(--outline-variant); display: flex; z-index: 100; }
    .nav { flex: 1; border: none; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 12px; color: #49454f; cursor: pointer; }
    .nav-icon { width: 64px; height: 32px; border-radius: 16px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .nav.active { color: #1d1b20; font-weight: 500; }
    .nav.active .nav-icon { background: var(--primary-container); }

    #loading { text-align: center; padding: 40px; color: var(--outline); }

    #context-menu { display: none; position: fixed; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 1000; padding: 8px 0; min-width: 200px; border: 1px solid var(--outline-variant); overflow: hidden; }
    #context-menu div { padding: 12px 16px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 12px; transition: background 0.2s; }
    #context-menu div:hover { background: var(--outline-variant); }

    #dump-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; padding: 16px; }
    .dialog-container { background: white; border-radius: 20px; width: 100%; max-width: 400px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .dialog-header { padding: 20px; border-bottom: 1px solid var(--outline-variant); }
    .dialog-body { flex: 1; overflow-y: auto; padding: 8px; background: #f8f9fa; }
    .dialog-footer { padding: 12px 20px; border-top: 1px solid var(--outline-variant); display: flex; justify-content: flex-end; gap: 12px; }

    .map-card { background: white; border-radius: 10px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--outline-variant); font-family: monospace; font-size: 11px; cursor: pointer; transition: 0.2s; }
    .map-card:hover { border-color: var(--primary); background: var(--primary-container); }
    .map-header { display: flex; justify-content: space-between; margin-bottom: 6px; color: var(--primary); font-weight: 600; font-size: 12px; }
    .map-path { color: var(--outline); word-break: break-all; margin-top: 6px; font-size: 10px; line-height: 1.4; }
    .map-perms { background: #eee; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
  </style>
</head>

<body>
<div class="app">
  <div class="topbar">
    <div class="search-box">
      <span class="material-icons-round" style="font-size: 20px; color: var(--outline)">search</span>
      <input type="text" id="search-input" placeholder="Search apps..." oninput="filterApps()">
    </div>
    <button onclick="refreshApps()" style="background:none; border:none; color:var(--primary); cursor:pointer;">
      <span class="material-icons-round">refresh</span>
    </button>
  </div>

  <div class="content">
    <div id="home" class="page active">
      <div id="running-apps-section" style="display:none">
        <div class="label"><span>Running apps</span></div>
        <div id="running-app-list"></div>
      </div>

      <div class="label">
        <span>Installed apps</span>
        <span id="app-count">0 apps</span>
      </div>
      <div id="loading">Loading apps</div>
      <div id="app-list"></div>
    </div>

    <div id="settings" class="page">
      <div class="label">Module Configuration</div>
      <div class="setting-card">
        <div class="setting-row">
          <div>
            <div style="font-weight:500">Enable Zygisk Bypass</div>
            <div style="font-size:12px; color:var(--outline)">Auto invalidate inline hooks</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="enabled-toggle" onchange="saveConfig()">
            <span class="slider"></span>
          </label>
        </div>
        <div style="margin-top: 20px; border-top: 1px solid var(--outline-variant); padding-top: 16px;">
          <div style="font-weight:500; font-size:14px;">Target Library Name</div>
          <input type="text" id="lib-name" class="input-field" placeholder="libart.so" oninput="saveConfig()">
          <div style="font-size:11px; color:var(--outline); margin-top: 8px;">Hooks in this library will be cleaned at app launch.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="navbar">
    <button class="nav active" id="nav-home" onclick="openTab('home', this)">
      <div class="nav-icon"><span class="material-icons-round">home</span></div>Home
    </button>
    <button class="nav" id="nav-settings" onclick="openTab('settings', this)">
      <div class="nav-icon"><span class="material-icons-round">settings</span></div>Settings
    </button>
  </div>
</div>

<div id="context-menu">
  <div onclick="promptDumpLib()">
    <span class="material-icons-round" style="font-size:20px;">memory</span>
    <span>Explore Memory Maps</span>
  </div>
</div>

<div id="dump-dialog">
    <div class="dialog-container">
        <div class="dialog-header">
            <div style="font-weight:600; font-size:18px; margin-bottom:14px;">Process Memory Maps</div>
            <div class="search-box">
                <span class="material-icons-round" style="font-size: 20px; color: var(--outline)">search</span>
                <input type="text" id="map-search" placeholder="Filter libs, offsets, or perms..." oninput="filterMaps()">
            </div>
        </div>
        <div class="dialog-body">
            <div id="map-loading" style="text-align:center; padding:20px; color:var(--outline);">Reading maps from /proc...</div>
            <div id="map-entries"></div>
        </div>
        <div class="dialog-footer">
            <button onclick="closeDumpDialog()" style="background:none; border:none; color:var(--primary); font-weight:600; padding:10px; cursor:pointer;">CLOSE</button>
        </div>
    </div>
</div>
